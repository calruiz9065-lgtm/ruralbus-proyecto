<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - RuralBus PROYECTO</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="logo.png.png" alt="RuralBus Logo" class="login-logo">
                <h2>Bienvenido a RuralBus</h2>
                <p>Inicie sesión para acceder al panel de administración.</p>
            </div>
            <form id="loginForm" class="login-form" autocomplete="off">
                <div class="input-group">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" required autocomplete="off">
                </div>
               <div class="input-group">
    <label for="password">Contraseña:</label>

    <div class="input-password-wrapper">
        <input type="password" id="password" required autocomplete="off">

        <button type="button" class="toggle-password">
            <i class="fas fa-eye"></i>
        </button>
    </div>
</div>
                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>
            <div class="login-footer">
                <p>¿No tienes una cuenta?</p>
                <a href="registro.html" class="btn-create-account">Crear Nueva Cuenta</a>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
