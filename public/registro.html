<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - RuralBus PROYECTO</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="registro-page">

    <div class="registro-container">
        <div class="registro-card">
            <div class="registro-header">
                <h2>Crear Cuenta</h2>
                <p>Crea tu nueva cuenta para acceder a RuralBus.</p>
            </div>

       <form id="registroForm" required autocomplete="off">
    <div class="input-group">
        <label for="username">Usuario:</label>
        <input type="text" id="username" required autocomplete="off">
    </div>
    
    <div class="input-group">
        <label for="password">Contraseña:</label>
        <div class="input-password-wrapper">
            <input type="password" id="password" required>
            <button type="button" class="toggle-password" aria-label="Mostrar/Ocultar Contraseña">
                <i class="fas fa-eye"></i> 
            </button>
        </div>
    </div>
    <button type="submit" class="btn-registro">Registrar</button>
</form>


            <div class="registro-footer">
                <p>¿Ya tienes una cuenta?</p>
                <a href="index.html" class="btn-create-account">Iniciar Sesión</a>
            </div>
        </div>
    </div>

    <script src="registro.js"></script>
</body>
</html>
