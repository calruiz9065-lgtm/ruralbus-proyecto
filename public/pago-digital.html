<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Digital y Billetera Virtual - RuralBus</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="dashboard-header">
    <div class="header-left">
        <img src="logo.png.png" alt="RuralBus" class="header-logo">
    </div>
    <a href="reservas.html" class="btn-volver">
        <i class="fas fa-arrow-left"></i> Volver al Panel
    </a>
</header>

    <main class="main-content">
        <section class="module-header">
            <h2>Pago Digital y Billetera Virtual</h2>
            <p>Gestione su saldo para pagos rápidos, sin contacto y emisión de boletos en línea.</p>
        </section>

        <div class="payment-grid">
            <section class="content-card saldo-card">
                <h3><i class="fas fa-wallet"></i> Saldo Disponible</h3>
                <p class="balance-value" id="saldoActual">C$1,500.00</p>
                <p class="text-description">Tu saldo actual para comprar boletos en línea.</p>
            </section>

            <section class="content-card recharge-card">
                <h3><i class="fas fa-credit-card"></i> Recargar Saldo</h3>
                <form id="rechargeForm" class="grid-form-single">
                    <div>
                        <label for="montoRecargar">Monto a Recargar (C$):</label>
                        <input type="number" id="montoRecargar" placeholder="0.00" required>
                    </div>
                    <div>
                        <label for="numeroTarjeta">Número de Tarjeta (Simulado):</label>
                        <input type="text" id="numeroTarjeta" value="**** **** 1234" disabled>
                    </div>
                    <div class="full-width-button">
                        <button type="submit" class="btn-primary">+ Confirmar Recarga</button>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <footer class="custom-footer">
        <p>© 2025 RuralBus. Todos los derechos reservados.</p>
    </footer>
</body>
</html>

    <script>
        // Saldo inicial
        let saldo = 1500.00;

        // Escuchar el envío del formulario de recarga
        document.getElementById('rechargeForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevenir recarga de la página

            const montoInput = document.getElementById('montoRecargar').value;
            const monto = parseFloat(montoInput);

            if (!isNaN(monto) && monto > 0) {
                saldo += monto; // Sumar el monto al saldo
                // Mostrar saldo actualizado en el HTML
                document.getElementById('saldoActual').textContent = `C$${saldo.toFixed(2)}`;
            } else {
                alert("Por favor ingresa un monto válido para recargar.");
            }

            // Limpiar campo de entrada
            document.getElementById('montoRecargar').value = '';
        });
    </script>
</body><script>
    document.addEventListener('DOMContentLoaded', () => {
        const usuarioActivo = localStorage.getItem('usuarioActivo');
        const perfilNombre = document.querySelector('.perfil-nombre');

        // 1. RESTRICCIÓN DE ACCESO INMEDIATA (La guardia de la página)
        // Si NO hay usuario activo, redirige a index.html y ELIMINA esta página del historial.
        if (!usuarioActivo) {
            // **CLAVE:** usa replace() para que el botón de retroceso no pueda volver a esta página.
            window.location.replace("index.html");
            return; // Detiene la ejecución del resto del script.
        }

        // --- Resto de la lógica (Solo se ejecuta si hay usuarioActivo) ---

        // 2. CONFIGURACIÓN DEL NOMBRE
        if (perfilNombre) {
            perfilNombre.textContent = usuarioActivo.toUpperCase();
        }

        // 3. CIERRE DE SESIÓN (Logout)
        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('usuarioActivo');
            // **CLAVE:** usa replace() para que el botón de retroceso no pueda volver aquí.
            window.location.replace('index.html'); 
        });

        // 4. LÓGICA DEL TOGGLE DEL MENÚ (Se mantiene)
        const profileToggle = document.getElementById("profileToggle");
        const profileMenu = document.getElementById("profileMenu"); 
        
        if (profileToggle && profileMenu) {
            profileToggle.addEventListener('click', function(e) {
                e.stopPropagation(); 
                profileMenu.classList.toggle("show");
            });

            document.addEventListener("click", function (e) {
                if (!profileMenu.contains(e.target)) {
                    profileMenu.classList.remove("show");
                }
            });
        }
    });
</script>
</html>
