<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emitir Boletos Electrónicos - RuralBus PROYECTO</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <header class="dashboard-header">
        <div class="logo">
            <img src="logo.png.png" alt="RuralBus Logo"> 
        
        </div>
        <a href="reservas.html" class="btn-volver">
            <i class="fas fa-arrow-left"></i> Volver al Panel
        </a>
    </header>

    <main class="main-content">
        <section class="module-header">
            <h2>Emitir Boletos Electrónicos</h2>
            <p>Genera y gestiona los boletos con código QR para sus pasajeros.</p>
        </section>

        <section class="content-card">
            <h3>Buscar Reserva y Emitir Boleto</h3>
            <form id="buscarReservaForm" class="form-card search-form">
                <input type="text" id="reservaIdInput" >
                <button type="submit" class="btn-primary">Buscar Reserva</button>
            </form>
            
            <div id="boletoOutput" class="boleto-output" style="margin-top: 20px; display: none;">
                <h4>Detalles del Boleto:</h4>
                <p id="pasajeroInfo">Pasajero: </p>
                <p id="rutaInfo">Ruta: </p>
                <div id="qrcode" style="width:120px; height:120px; margin-top:10px;"></div>
                <p style="margin-top:10px; font-weight: bold;">Boleto Válido</p>
            </div>

            <p id="errorMensaje" style="color: red; display: none; margin-top: 10px;">Reserva no encontrada.</p>
        </section>
    </main>

    <footer>
        <p>© 2025 RuralBus.Todos los derechos reservados.</p>
    </footer>

    <script>
        // Simulando reservas existentes
        const reservas = [
            { id: "0001234567890", nombre: "Cristopher López", ruta: "MANAGUA - GRANADA" },
            { id: "0009876543210", nombre: "Pedro González", ruta: "MANAGUA - RIO BLANCO" },
             
        ];

        // Función para generar un código aleatorio tipo QR
        function generarCodigoQR() {
            return "BOLETO-" + Math.floor(1000 + Math.random() * 9000); // BOLETO-1234
        }

        document.getElementById("buscarReservaForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const inputId = document.getElementById("reservaIdInput").value.trim().toUpperCase();
            const reserva = reservas.find(r => r.id === inputId);

            const boletoOutput = document.getElementById("boletoOutput");
            const errorMensaje = document.getElementById("errorMensaje");
            const qrContainer = document.getElementById("qrcode");

            // Limpiar QR anterior
            qrContainer.innerHTML = "";

            if (reserva) {
                // Mostrar datos
                document.getElementById("pasajeroInfo").textContent = `Pasajero: ${reserva.nombre}`;
                document.getElementById("rutaInfo").textContent = `Ruta: ${reserva.ruta}`;

                // Generar y mostrar QR
                const codigoQR = generarCodigoQR();
                new QRCode(qrContainer, {
                    text: codigoQR,
                    width: 120,
                    height: 120
                });

                boletoOutput.style.display = "block";
                errorMensaje.style.display = "none";
            } else {
                boletoOutput.style.display = "none";
                errorMensaje.style.display = "block";
            }
        });
    </script>
</body>
</html>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const usuarioActivo = localStorage.getItem('usuarioActivo');
        const perfilNombre = document.querySelector('.perfil-nombre');

        // 1. RESTRICCIÓN DE ACCESO INMEDIATA (La guardia de la página)
        // Si NO hay usuario activo, redirige a index.html y ELIMINA esta página del historial.
        if (!usuarioActivo) {
            // **CLAVE:** usa replace() para que el botón de retroceso no pueda volver a esta página.
            window.location.replace("index.html");
            return; // Detiene la ejecución del resto del script.
        }

        // --- Resto de la lógica (Solo se ejecuta si hay usuarioActivo) ---

        // 2. CONFIGURACIÓN DEL NOMBRE
        if (perfilNombre) {
            perfilNombre.textContent = usuarioActivo.toUpperCase();
        }

        // 3. CIERRE DE SESIÓN (Logout)
        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('usuarioActivo');
            // **CLAVE:** usa replace() para que el botón de retroceso no pueda volver aquí.
            window.location.replace('index.html'); 
        });

        // 4. LÓGICA DEL TOGGLE DEL MENÚ (Se mantiene)
        const profileToggle = document.getElementById("profileToggle");
        const profileMenu = document.getElementById("profileMenu"); 
        
        if (profileToggle && profileMenu) {
            profileToggle.addEventListener('click', function(e) {
                e.stopPropagation(); 
                profileMenu.classList.toggle("show");
            });

            document.addEventListener("click", function (e) {
                if (!profileMenu.contains(e.target)) {
                    profileMenu.classList.remove("show");
                }
            });
        }
    });
</script>
